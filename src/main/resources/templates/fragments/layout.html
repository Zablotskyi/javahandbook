<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<body>

<header class="site-header" th:fragment="header">
    <div class="logo">
        <a href="/" class="logo-link">
            <span class="logo-icon">☕</span>
            <span class="logo-text">Java Handbook</span>
        </a>
    </div>

    <nav class="header-nav">
        <a href="/">Головна</a>
        <a href="/admin">Адмінка</a>

        <form th:action="@{/logout}" method="post" class="logout-form">
            <button type="submit" class="logout-button">
                Вийти
            </button>
        </form>
    </nav>
</header>

<aside class="left-sidebar" th:fragment="leftSidebar">
    <nav class="sidebar-menu">

        <div class="menu-section" th:each="section : ${menuSections}">
            <button class="menu-title" th:text="${section.title()}">
                Java Core
            </button>

            <ul class="submenu"
                th:classappend="${#strings.startsWith(activePage, section.code())} ? ' open' : ''">

                <li th:each="article : ${section.articles()}">
                    <a th:href="@{'/articles/' + ${article.slug()}}"
                       th:text="${article.title()}"
                       th:classappend="${article.slug() == activePage} ? 'active' : ''">
                        Назва статті
                    </a>
                </li>

            </ul>
        </div>

    </nav>
</aside>

<aside class="right-sidebar" th:fragment="rightSidebar">
    <div class="right-placeholder">
        <p>Тут пізніше можуть бути посилання, реклама або корисні ресурси.</p>
    </div>
</aside>

<footer class="site-footer" th:fragment="footer">
    <p>
        © 2026 Java Handbook. Навчальний довідник по Java.
        <span class="footer-separator">|</span>
        <span>
            Відвідувань сайту:
            <strong th:text="${visitsCount}">0</strong>
        </span>
    </p>
</footer>

</body>
</html>
