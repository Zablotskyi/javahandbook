<!DOCTYPE html>
<html lang="uk" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Адмін-панель | Java Handbook</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div th:replace="~{fragments/layout :: header}"></div>

<div class="page-layout">

    <div th:replace="~{fragments/layout :: leftSidebar}"></div>

    <main class="content">
        <article class="article-card">
            <h1>Адмін-панель</h1>

            <p class="article-description">
                Тут можна керувати статтями, розділами меню та коментарями сайту.
            </p>

            <div th:replace="~{fragments/admin-nav :: adminNav}"></div>

            <section class="admin-dashboard">
                <div class="admin-dashboard-grid">

                    <a class="admin-dashboard-card" th:href="@{/admin/articles}">
                        <h2>Статті</h2>
                        <p>Керування матеріалами сайту.</p>
                        <strong th:text="${articlesCount}">0</strong>
                    </a>

                    <a class="admin-dashboard-card" th:href="@{/admin/menu-groups}">
                        <h2>Розділи меню</h2>
                        <p>Керування групами лівого меню.</p>
                        <strong th:text="${menuGroupsCount}">0</strong>
                    </a>

                    <a class="admin-dashboard-card" th:href="@{/admin/comments}">
                        <h2>Коментарі</h2>
                        <p>Модерація та видалення коментарів.</p>

                        <span>
                            На модерації:
                            <strong th:text="${pendingCommentsCount}">0</strong>
                        </span>

                        <span>
                            Опубліковано:
                            <strong th:text="${approvedCommentsCount}">0</strong>
                        </span>
                    </a>

                </div>
            </section>
        </article>
    </main>

    <div th:replace="~{fragments/layout :: rightSidebar}"></div>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>

<script src="/js/main.js"></script>
</body>
</html>
